name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8' 
        distribution: 'temurin'
        cache: maven 

    - name: Install xvfb
      run: sudo apt-get install -y xvfb

    - name: Run Unit Tests
      run: xvfb-run mvn clean test

    - name: Run Integration Tests
      run: xvfb-run mvn verify 

    - name: Generate JaCoCo Coverage Report
      run: mvn jacoco:report

    - name: Run PIT Mutation Testing
      run: xvfb-run mvn org.pitest:pitest-maven:mutationCoverage

    - name: Archive PIT Mutation Report
      uses: actions/upload-artifact@v4
      with:
        name: pit-mutation-report
        path: '**/target/pit-reports/'

    - name: Archive JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-coverage-report
        path: '**/target/site/jacoco/'